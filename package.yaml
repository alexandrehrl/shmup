name:                spacegame
version:             0.1.0.0
license:             BSD-3-Clause
author:              "Alexandre Hurel"
maintainer:          "alexandre@hurel.info"
copyright:           "2026 Alexandre Hurel"

dependencies:
- base >= 4.7 && < 5
- random
- containers

ghc-options:
- -Wall
- -Wcompat

library:
  source-dirs: src
  exposed-modules:
  - Lib
  - Niveaux
  - GlossCoords

executables:
  spacegame-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - spacegame

  spacegame-gloss:
    main:                MainGloss.hs
    source-dirs:         app-gloss
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - spacegame
    - gloss
    - gloss-juicy

tests:
  spacegame-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - spacegame
    - hspec
    - QuickCheck
